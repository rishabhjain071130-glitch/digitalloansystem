<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Member Login - Society Loan Management</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="auth-wrap fade-in">
      <div class="auth-card">
        <h1>Member Login</h1>
        <p class="subtitle">Access your personal financial dashboard</p>

        <form id="memberLoginForm" class="stack-form">
          <h2>Sign In</h2>
          <input type="text" id="memberLoginId" placeholder="Member ID (e.g. M001)" required />
          <input type="password" id="memberPassword" placeholder="Password" required />
          <button type="submit">Login as Member</button>
        </form>

        <div id="memberLoginMsg" class="status"></div>
        <a class="dash-link" href="/">← Back to Admin Login</a>
      </div>
    </div>

    <script src="/script.js"></script>
  </body>
</html>
